# BL-1 Wagenaar-Burst Training Configuration
#
# Sister to configs/wagenaar_calibrated.yaml.  That config locks the
# *simulation*-side parameters that produce spontaneous bursting on the
# forward pass; this config locks the *training*-side parameters that
# drive burst-rate-loss convergence under the differentiable trainer.
#
# Contract:
#   FR ratio        > 70% of target_firing_rate_hz
#   Burst ratio     > 60% of target_burst_rate_per_min
#   Bio-validation  6/6 Wagenaar (unchanged from wagenaar_calibrated.yaml)
#   No NaN epochs
#
# Updating this file MUST be accompanied by:
#   1. scripts/slurm_train_burst.sh on the production recording
#      (DGX Spark, 5K neurons, 100 epochs)
#   2. bash scripts/run_validation.sh --quick passing
#
# Reference: Wagenaar, Pine & Potter (2006) J Neurosci 26(31):7610-7625

# These keys map 1:1 to bl1.training.trainer.TrainingConfig fields.
# Anything not listed here uses the TrainingConfig default.

training:
  # Network
  n_neurons: 5000
  ei_ratio: 0.8

  # Simulation -- 5s is the burst-detection regime
  sim_duration_ms: 5000.0
  dt: 0.5

  # Optimizer
  learning_rate: 5.0e-5            # Lower than FR-only (1e-4) for the longer scan
  n_epochs: 100
  grad_clip_norm: 1.0

  # Wagenaar 2006 targets (same as wagenaar_calibrated.yaml)
  target_firing_rate_hz: 1.6
  target_burst_rate_per_min: 8.0

  # Loss weights -- burst-rate becomes a primary objective
  w_firing_rate: 1.0
  w_burst_rate: 0.5
  w_synchrony: 0.5
  w_weight_reg: 0.01

  # Surrogate gradient (lower beta = smoother gradients for the long scan)
  surrogate_beta: 5.0

  # Network topology -- matches wagenaar_calibrated.yaml
  lambda_um: 200.0
  p_max: 0.21
  g_exc_init: 0.12
  g_inh_init: 0.36

  # Adaptive noise solved the FR floor.  Keep enabled.
  auto_noise: true
  I_noise_amplitude: 3.0

  # Short-term plasticity (Tsodyks-Markram) -- STP is the critical
  # ingredient for biologically realistic bursting.  Excitatory U=0.30
  # and tau_rec=800ms terminate bursts via depression on the
  # wagenaar_calibrated.yaml IBI timescale.
  use_stp: true
  U_exc: 0.30
  tau_rec: 800.0

  # Weight bounds
  init_weight_scale: 0.3            # Auto-noise will override this per target
  max_weight: 0.5

  seed: 42
