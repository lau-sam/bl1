name: Bug report
description: Report incorrect behaviour, a crash, or a numerical/model-accuracy issue.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. For scientific/model-accuracy issues,
        please cite the relevant paper and the equation or metric affected.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: A minimal code snippet or command sequence that triggers the bug.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to happen (cite a paper/equation if relevant).
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python/Rust version, JAX version, CPU/GPU, and how BL-1 was installed.
      placeholder: |
        - OS:
        - Python:
        - JAX / jaxlib:
        - Accelerator (CPU/GPU + model):
        - BL-1 version / commit:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      render: shell
